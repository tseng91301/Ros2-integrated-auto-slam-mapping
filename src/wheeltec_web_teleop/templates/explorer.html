<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thor Autonomous Explorer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .explorer-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1.5rem;
            margin-top: 1rem;
            height: calc(100vh - 120px);
        }
        @media (max-width: 1024px) {
            .explorer-layout {
                grid-template-columns: 1fr;
                height: auto;
            }
        }
        .control-group {
            background: rgba(30, 41, 59, 0.35);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .control-group h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin: 0 0 0.25rem 0;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
        }
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .btn-row {
            display: flex;
            gap: 0.75rem;
        }
        .explorer-btn {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }
        .explorer-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }
        .btn-primary {
            background: rgba(6, 182, 212, 0.15);
            border-color: rgba(6, 182, 212, 0.4);
            color: #06b6d4;
        }
        .btn-primary:hover {
            background: #06b6d4;
            color: #0f172a;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.35);
        }
        .btn-warn {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.4);
            color: #f59e0b;
        }
        .btn-warn:hover {
            background: #f59e0b;
            color: #0f172a;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.35);
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }
        .btn-danger:hover {
            background: #ef4444;
            color: #ffffff;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }
        .btn-estop-explorer {
            padding: 1.25rem;
            font-size: 1.1rem;
            font-family: 'Orbitron', sans-serif;
            background: rgba(239, 68, 68, 0.35);
            border-color: #ef4444;
            color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }
        .btn-estop-explorer:hover {
            background: #ef4444;
            color: #ffffff;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.7);
        }
        .input-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .input-group input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            color: #ffffff;
            padding: 0.5rem;
            width: 70px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
        }
        .input-group input:focus {
            border-color: #06b6d4;
            outline: none;
        }
        .sidebar-scroll {
            height: 100%;
            overflow-y: auto;
            padding-right: 0.25rem;
        }
        /* Custom scrollbar */
        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        .monitor-panel {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .map-container {
            flex-grow: 1;
            position: relative;
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    
    <div class="app-container">
        <!-- HEADER / TELEMETRY HUD -->
        <header class="hud-header">
            <div class="hud-logo">
                <a href="/" style="text-decoration: none; color: inherit;">
                    <span class="logo-accent">THOR</span> EXPLORER
                </a>
            </div>
            
            <div class="hud-telemetry">
                <div class="tel-item">
                    <span class="tel-label">STATUS:</span>
                    <span class="tel-value text-cyan" id="val-status">PAUSED</span>
                </div>
                <div class="tel-item">
                    <span class="tel-label">ACTIVE GOAL:</span>
                    <span class="tel-value" id="val-goal">None</span>
                </div>
                <div class="tel-item">
                    <span class="tel-label">LAP PROGRESS:</span>
                    <span class="tel-value text-purple" id="val-laps">1 / 1</span>
                </div>
                <div class="tel-item">
                    <span class="tel-label">FRONTIERS:</span>
                    <span class="tel-value" id="val-frontiers">0 clusters</span>
                </div>
            </div>

            <div class="hud-status">
                <div class="status-indicator offline" id="status-dot"></div>
                <span class="status-text" id="status-text">OFFLINE</span>
            </div>
        </header>

        <!-- EXPLORER GRID VIEW -->
        <div class="explorer-layout">
            <!-- MAP PANEL -->
            <section class="monitor-panel">
                <div class="monitor-screen" style="height: 100%; display: flex; flex-direction: column;">
                    <div class="scanlines"></div>
                    <div class="monitor-header-bar">
                        <span class="terminal-text">SYS.EXPLORATION.MONITOR</span>
                        <div class="monitor-resolution" id="map-telemetry">Map: Waiting...</div>
                    </div>
                    
                    <div class="map-container">
                        <canvas id="map-canvas"></canvas>
                        <div class="map-overlay-grid"></div>
                        <div class="map-controls">
                            <button class="map-ctrl-btn" id="btn-zoom-in" title="Zoom In">+</button>
                            <button class="map-ctrl-btn" id="btn-zoom-out" title="Zoom Out">-</button>
                            <button class="map-ctrl-btn" id="btn-zoom-reset" title="Reset View">⟲</button>
                        </div>
                        <div class="map-loading" id="map-placeholder">
                            <div class="radar-sweep"></div>
                            <span class="pulse-text">CONNECTING TO ROS2 ENVIRONMENT...</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- CONTROLS SIDEBAR -->
            <aside class="sidebar-scroll">
                <!-- EXPLORATION ENGINE CONTROL -->
                <div class="control-group">
                    <h3>EXPLORATION CONTROLLER</h3>
                    <div class="btn-stack">
                        <button class="explorer-btn btn-primary" id="btn-start">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            START EXPLORATION
                        </button>
                        <div class="btn-row">
                            <button class="explorer-btn btn-warn" id="btn-pause" style="flex: 1;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                                PAUSE
                            </button>
                            <button class="explorer-btn btn-primary" id="btn-resume" style="flex: 1;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                                RESUME
                            </button>
                        </div>
                        <button class="explorer-btn" id="btn-reset-explore">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
                            RESET EXPLORATOR
                        </button>
                    </div>
                </div>

                <!-- CONFIGURATION -->
                <div class="control-group">
                    <h3>LOOP SETTINGS</h3>
                    <div class="input-group">
                        <label for="lap-input" style="font-size: 0.85rem; color: #9ca3af; flex-grow: 1;">Exploration Laps:</label>
                        <input type="number" id="lap-input" min="1" max="10" value="1">
                        <button class="explorer-btn btn-primary" id="btn-set-laps" style="padding: 0.5rem 1rem;">SET</button>
                    </div>
                </div>

                <!-- SLAM MAP MANAGEMENT -->
                <div class="control-group">
                    <h3>MAP MANAGEMENT</h3>
                    <div class="btn-stack">
                        <button class="explorer-btn" id="btn-save-robot">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                            SAVE MAP (ROBOT)
                        </button>
                        <button class="explorer-btn btn-danger-hover" id="btn-reset-map">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg>
                            RESET SLAM MAP
                        </button>
                        <div class="btn-row">
                            <button class="explorer-btn" id="btn-download-png" style="flex: 1; padding: 0.6rem 0.5rem; font-size: 0.75rem;">
                                DOWNLOAD PNG
                            </button>
                            <button class="explorer-btn" id="btn-download-ros" style="flex: 1; padding: 0.6rem 0.5rem; font-size: 0.75rem;">
                                DOWNLOAD ZIP
                            </button>
                        </div>
                    </div>
                </div>

                <!-- EMERGENCY TERMINATION -->
                <div class="control-group" style="background: rgba(239, 68, 68, 0.05); border-color: rgba(239, 68, 68, 0.25);">
                    <button class="explorer-btn btn-estop-explorer" id="btn-estop">
                        EMERGENCY STOP
                    </button>
                </div>
            </aside>
        </div>
    </div>
    
    <script src="/static/js/map_canvas.js"></script>
    <script src="/static/js/explorer.js"></script>
</body>
</html>
