<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thor Autonomous Explorer</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #0d1527 0%, #030712 100%);
            color: #f3f4f6;
            overflow: hidden;
        }
        .placeholder-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            box-sizing: border-box;
            text-align: center;
        }
        .placeholder-card {
            background: rgba(30, 41, 59, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 3.5rem 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .placeholder-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ffffff;
            margin: 0 0 1.5rem 0;
        }
        .placeholder-logo span {
            color: #06b6d4;
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }
        .placeholder-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(6, 182, 212, 0.1);
            border: 2px dashed rgba(6, 182, 212, 0.4);
            color: #06b6d4;
            margin-bottom: 2rem;
            animation: rotate-dash 10s linear infinite;
        }
        @keyframes rotate-dash {
            100% { transform: rotate(360deg); }
        }
        .placeholder-desc {
            font-size: 1.05rem;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(245, 158, 11, 0.15);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #f59e0b;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #f59e0b;
            box-shadow: 0 0 8px #f59e0b;
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.8rem 2.2rem;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
            border: 1px solid rgba(6, 182, 212, 0.4);
            background: rgba(6, 182, 212, 0.1);
            color: #06b6d4;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #06b6d4;
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
            transform: translateY(-2px);
        }
        .back-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="placeholder-container">
        <div class="placeholder-card">
            <div class="placeholder-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon>
                </svg>
            </div>
            
            <h1 class="placeholder-logo"><span>AUTO</span> EXPLORER</h1>
            
            <div class="status-badge">
                <span class="status-dot"></span>
                Under Construction
            </div>
            
            <p class="placeholder-desc">
                Autonomous exploration mode using frontier-based clustering and path planning is currently deactivated. The user interface and integration nodes are prepared for future modules.
            </p>
            
            <a href="/" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Return to Portal
            </a>
        </div>
    </div>
</body>
</html>
